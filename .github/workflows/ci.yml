name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check tools/ agents/ tests/ --ignore E501

      - name: Run tests (Python ${{ matrix.python-version }})
        run: |
          python -m pytest tests/ -v --tb=short --junit-xml=test-results-${{ matrix.python-version }}.xml 2>&1 | tee test-output-${{ matrix.python-version }}.txt
          echo "TEST_EXIT=${PIPESTATUS[0]}" >> $GITHUB_ENV

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-${{ matrix.python-version }}
          path: |
            test-results-${{ matrix.python-version }}.xml
            test-output-${{ matrix.python-version }}.txt

      - name: Fail if tests failed
        if: env.TEST_EXIT != '0'
        run: exit 1
