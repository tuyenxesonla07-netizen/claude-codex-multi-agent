name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pywebview

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Build exe with PyInstaller
        run: pyinstaller desktop/build.spec --clean --noconfirm

      - name: Prepare Windows package
        shell: cmd
        run: |
          mkdir D:\release-package
          copy D:\dist\claude-codex-multi-agent.exe D:\release-package\
          xcopy /E /I /Y D:\config D:\release-package\config
          xcopy /E /I /Y D:\server D:\release-package\server
          xcopy /E /I /Y D:\agents D:\release-package\agents
          xcopy /E /I /Y D:\tools D:\release-package\tools
          xcopy /E /I /Y D:\scripts D:\release-package\scripts
          xcopy /E /I /Y D:\frontend\dist D:\release-package\static
          echo Double-click claude-codex-multi-agent.exe to start the application. > D:\release-package\README.txt
          echo The backend server will start automatically and open your browser. >> D:\release-package\README.txt
          powershell -Command "Compress-Archive -Path 'D:\release-package\*' -DestinationPath 'D:\claude-codex-multi-agent-${{ github.ref_name }}-windows.zip' -Force"

      - name: Upload Windows build artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: D:/claude-codex-multi-agent-*-windows.zip
          retention-days: 30

  release:
    needs: build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: ./dist

      - name: Create source archive
        run: |
          zip -r claude-codex-multi-agent-${{ github.ref_name }}-src.zip . \
            -x "*.git*" -x "__pycache__/*" -x "*.pyc" -x "frontend/node_modules/*" \
            -x "frontend/dist/*" -x "data/*" -x "desktop/build.spec" \
            -x "desktop/dist/*" -x "desktop/__pycache__/*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/claude-codex-multi-agent-*-windows.zip
            claude-codex-multi-agent-${{ github.ref_name }}-src.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
