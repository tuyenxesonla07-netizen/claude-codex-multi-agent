# docker/nginx/nginx.conf — Reverse proxy for production
# TLS 1.2/1.3, security headers, rate limiting

worker_processes auto;
pid /var/run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    # ── Security: hide version ─────────────────────────────
    server_tokens off;

    # ── Rate limiting ──────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=health:10m rate=60r/m;

    # ── SSL settings ───────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

  # ── Proxy headers ──────────────────────────────────────
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $request_id;

    # ── Upstream ───────────────────────────────────────────
    upstream app_server {
        server app:8080;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS server ───────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        # TLS certificates (mounted from host)
        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Request body size limit
        client_max_body_size 10m;

        # ── Health check (no rate limit) ───────────────────
        location /api/v1/health {
            proxy_pass http://app_server;
        }

        # ── Metrics (internal only) ────────────────────────
        location /metrics {
            # Only allow from internal network (Docker)
            allow 172.0.0.0/8;
            deny all;
            proxy_pass http://app_server;
        }

        # ── API endpoints (rate limited) ───────────────────
        location /api/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://app_server;
        }

        # ── SSE streaming ───────────────────────────────────
        location /api/v1/pipeline/stream {
            limit_req zone=api burst=5 nodelay;
            proxy_pass http://app_server;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
        }

        # ── Block all other paths ──────────────────────────
        location / {
            return 404;
        }
    }
}
