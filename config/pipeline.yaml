## 质量门禁规则

```yaml
quality_gates:
  - name: "模块审查通过"
    metric: "all_modules_passed"
    operator: "equals"
    value: true
    blocking: true

  - name: "安全评分"
    metric: "security_score"
    operator: ">="
    value: 0.8
    blocking: true

  - name: "测试覆盖率"
    metric: "test_coverage"
    operator: ">="
    value: 0.7
    blocking: false

  - name: "无严重问题"
    metric: "critical_issues_count"
    operator: "equals"
    value: 0
    blocking: true

  - name: "接口一致性"
    metric: "interface_consistency"
    operator: "equals"
    value: true
    blocking: true
```

---

## 超时与重试

```yaml
timeouts:
  default_step_timeout_ms: 30000
  max_pipeline_timeout_minutes: 30

retry:
  max_iterations: 3
  backoff_strategy: "exponential"
  base_delay_ms: 2000
  max_delay_ms: 30000
  retryable_errors:
    - E003  # timeout
    - E004  # internal
    - E005  # dependency
    - E008  # capacity
  non_retryable_errors:
    - E001  # validation
    - E006  # conflict
    - E007  # schema_mismatch
    - E009  # authorization
```

