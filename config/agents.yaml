# Agent 注册配置

> 定义所有 Agent 的注册信息、能力声明和 Schema 引用。

---

## 1. 注册表示例

```yaml
# config/agents.yaml

protocol_version: "1.0"
pipeline_type: "dual_phase"  # requirement_decomposition + code_review

agents:
  # === 主管 ===
  codex_supervisor:
    role: "supervisor"
    module: "orchestration"
    version: "1.0.0"
    capabilities:
      - requirement_parsing
      - task_decomposition
      - result_aggregation
      - quality_evaluation
      - conflict_resolution
    max_concurrency: 1
    timeout_ms: 60000

  # === Superpowers 插件 ===
  superpowers:
    role: "plugin"
    module: "infrastructure"
    version: "1.0.0"
    capabilities:
      - agent_registration
      - message_routing
      - context_injection
      - result_aggregation
    config:
      max_agents: 20
      message_ttl_ms: 30000
      retry_policy:
        max_retries: 3
        backoff: "exponential"
        base_delay_ms: 2000

  # === Prompt Agent ===
  prompt_agent:
    role: "integrator"
    module: "prompt_engineering"
    version: "1.0.0"
    capabilities:
      - context_integration
      - conflict_detection
      - prompt_generation
      - dependency_analysis
    max_concurrency: 1
    timeout_ms: 30000

  # === 专家 Agent ===
  expert_auth:
    role: "expert"
    module: "authentication"
    version: "1.0.0"
    capabilities:
      - jwt_auth
      - oauth2
      - session_management
      - rbac
    input_schema: "schemas/auth_input.json"
    output_schema: "schemas/auth_output.json"
    max_concurrency: 3
    timeout_ms: 30000
    review_capabilities:
      - security_audit
      - token_validation
      - session_security

  expert_product:
    role: "expert"
    module: "product_catalog"
    version: "1.0.0"
    capabilities:
      - product_search
      - category_management
      - inventory_display
      - filtering
    input_schema: "schemas/product_input.json"
    output_schema: "schemas/product_output.json"
    max_concurrency: 3
    timeout_ms: 30000
    dependencies:
      - authentication
    review_capabilities:
      - search_accuracy
      - cache_efficiency
      - data_consistency

  expert_cart:
    role: "expert"
    module: "shopping_cart"
    version: "1.0.0"
    capabilities:
      - cart_management
      - price_calculation
      - coupon_handling
      - inventory_validation
    input_schema: "schemas/cart_input.json"
    output_schema: "schemas/cart_output.json"
    max_concurrency: 3
    timeout_ms: 30000
    dependencies:
      - authentication
      - product_catalog
    review_capabilities:
      - price_accuracy
      - concurrency_safety
      - session_persistence

  expert_order:
    role: "expert"
    module: "order_system"
    version: "1.0.0"
    capabilities:
      - crud_operations
      - state_machine
      - inventory_management
      - order_workflow
    input_schema: "schemas/order_input.json"
    output_schema: "schemas/order_output.json"
    max_concurrency: 3
    timeout_ms: 30000
    dependencies:
      - authentication
      - shopping_cart
    review_capabilities:
      - data_consistency
      - concurrency_safety
      - transaction_integrity

  expert_payment:
    role: "expert"
    module: "payment_integration"
    version: "1.0.0"
    capabilities:
      - payment_gateway
      - idempotency
      - reconciliation
      - refund_handling
    input_schema: "schemas/payment_input.json"
    output_schema: "schemas/payment_output.json"
    max_concurrency: 3
    timeout_ms: 30000
    dependencies:
      - authentication
      - order_system
    review_capabilities:
      - financial_accuracy
      - compliance_check
      - idempotency_validation

  expert_notification:
    role: "expert"
    module: "notification_service"
    version: "1.0.0"
    capabilities:
      - email_notification
      - sms_notification
      - push_notification
      - template_management
    input_schema: "schemas/notification_input.json"
    output_schema: "schemas/notification_output.json"
    max_concurrency: 5
    timeout_ms: 30000
    dependencies:
      - authentication
    review_capabilities:
      - delivery_reliability
      - template_validation
      - rate_limiting

  expert_report:
    role: "expert"
    module: "data_reporting"
    version: "1.0.0"
    capabilities:
      - data_aggregation
      - chart_generation
      - export_formats
      - scheduled_reports
    input_schema: "schemas/report_input.json"
    output_schema: "schemas/report_output.json"
    max_concurrency: 3
    timeout_ms: 30000
    dependencies:
      - authentication
      - order_system
    review_capabilities:
      - data_accuracy
      - query_performance
      - export_integrity
```

