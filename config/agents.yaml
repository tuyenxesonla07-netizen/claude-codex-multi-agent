# Agent 注册配置

> 定义所有 Agent 的注册信息、能力声明和 Schema 引用。

---

## 1. 注册表示例

```yaml
# config/agents.yaml

protocol_version: "1.0"
pipeline_type: "dual_phase"  # requirement_decomposition + code_review

agents:
  # === 主管 ===
  codex_supervisor:
    role: "supervisor"
    module: "orchestration"
    version: "1.0.0"
    capabilities:
      - requirement_parsing
      - task_decomposition
      - result_aggregation
      - quality_evaluation
      - conflict_resolution
    max_concurrency: 1
    timeout_ms: 60000

  # === Superpowers 插件 ===
  superpowers:
    role: "plugin"
    module: "infrastructure"
    version: "1.0.0"
    capabilities:
      - agent_registration
      - message_routing
      - context_injection
      - result_aggregation
    config:
      max_agents: 20
      message_ttl_ms: 30000
      retry_policy:
        max_retries: 3
        backoff: "exponential"
        base_delay_ms: 2000

  # === Prompt Agent ===
  prompt_agent:
    role: "integrator"
    module: "prompt_engineering"
    version: "1.0.0"
    capabilities:
      - context_integration
      - conflict_detection
      - prompt_generation
      - dependency_analysis
    max_concurrency: 1
    timeout_ms: 30000

  # === 专家 Agent (auto-discovered from schemas) ===
  expert_authentication:
    role: "expert"
    module: "authentication"
    version: "1.0.0"
    capabilities:
      - jwt_auth
      - oauth2
      - session_management
      - rbac
    input_schema: "schemas/authentication_input.json"
    output_schema: "schemas/authentication_output.json"
    max_concurrency: 3
    timeout_ms: 30000
    review_capabilities:
      - security_audit
      - token_validation
      - session_security

  expert_data_processing:
    role: "expert"
    module: "data_processing"
    version: "1.0.0"
    capabilities:
      - data_transformation
      - validation
      - pipeline_orchestration
      - error_handling
    input_schema: "schemas/data_processing_input.json"
    output_schema: "schemas/data_processing_output.json"
    max_concurrency: 3
    timeout_ms: 30000
    dependencies:
      - authentication
    review_capabilities:
      - data_integrity
      - transformation_accuracy
      - error_coverage

  expert_api_integration:
    role: "expert"
    module: "api_integration"
    version: "1.0.0"
    capabilities:
      - rest_api_design
      - graphql_schema
      - middleware_integration
      - request_validation
    input_schema: "schemas/api_integration_input.json"
    output_schema: "schemas/api_integration_output.json"
    max_concurrency: 3
    timeout_ms: 30000
    dependencies:
      - authentication
    review_capabilities:
      - endpoint_consistency
      - input_validation
      - error_response_completeness
```

