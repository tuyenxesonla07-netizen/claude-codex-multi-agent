## 3. 流水线配置

```yaml
# config/pipeline.yaml

pipeline:
  name: "claude-codex-multi-agent"
  version: "1.0.0"

  phases:
    - name: "requirement_decomposition"
      description: "需求拆分阶段"
      steps:
        - id: "parse_requirement"
          agent: "codex_supervisor"
          action: "parse"
          timeout_ms: 30000

        - id: "identify_modules"
          agent: "codex_supervisor"
          action: "identify"
          timeout_ms: 15000

        - id: "dispatch_tasks"
          agent: "superpowers"
          action: "dispatch_parallel"
          parallel: true
          timeout_ms: 30000

        - id: "collect_specs"
          agent: "superpowers"
          action: "aggregate"
          timeout_ms: 10000

        - id: "generate_prompt"
          agent: "prompt_agent"
          action: "integrate"
          timeout_ms: 30000

        - id: "generate_code"
          agent: "claude_code"
          action: "implement"
          timeout_ms: 300000

    - name: "code_review"
      description: "代码审查阶段"
      steps:
        - id: "distribute_code"
          agent: "superpowers"
          action: "distribute_by_module"
          parallel: true
          timeout_ms: 15000

        - id: "collect_reviews"
          agent: "superpowers"
          action: "aggregate_reviews"
          timeout_ms: 10000

        - id: "evaluate_quality"
          agent: "codex_supervisor"
          action: "evaluate"
          timeout_ms: 15000

      retry_loop:
        condition: "quality_score < 0.8 OR has_critical_issues"
        max_iterations: 3
        steps:
          - id: "fix_code"
            agent: "claude_code"
            action: "fix"
            timeout_ms: 300000

  quality_gates:
    - metric: "all_modules_pass_review"
      threshold: true
    - metric: "security_score"
      threshold: ">= 0.8"
    - metric: "test_coverage"
      threshold: ">= 0.7"
    - metric: "no_critical_issues"
      threshold: true
```

