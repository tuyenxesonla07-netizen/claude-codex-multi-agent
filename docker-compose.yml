# docker-compose.yml

version: "3.9"

services:
  # PostgreSQL + pgvector
  postgres:
    image: pgvector/pgvector:pg16
    container_name: claude-codex-postgres
    environment:
      POSTGRES_DB: claude_codex
      POSTGRES_USER: claude
      POSTGRES_PASSWORD: codex123
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U claude -d claude_codex"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # FastAPI 后端
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: claude-codex-backend
    environment:
      DATABASE_URL: postgresql://claude:codex123@postgres:5432/claude_codex
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_API_BASE_URL: ${LLM_API_BASE_URL:-}
      LLM_API_MODEL: ${LLM_API_MODEL:-claude-opus-4-7}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Nginx 前端（可选，用于生产部署）
  frontend:
    image: nginx:alpine
    container_name: claude-codex-frontend
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    profiles:
      - production

volumes:
  pgdata:
