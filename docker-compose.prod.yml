# docker-compose.prod.yml — Production deployment
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml down
#
# With env file:
#   cp .env.example .env  # then edit
#   docker compose --env-file .env -f docker-compose.prod.yml up -d

version: "3.9"

services:
  # ── Reverse proxy (nginx) ─────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: cc-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl.conf:/etc/nginx/ssl.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    # Security: read-only root filesystem
    read_only: true
    tmpfs:
      - /var/cache/nginx:size=64M
      - /var/run:size=16M
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    networks:
      - frontend

  # ── Application ──────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile.production
    container_name: cc-app
    expose:
      - "8080"
    environment:
      - LLM_BACKEND=${LLM_BACKEND:-mock}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - CC_API_KEYS=${CC_API_KEYS:-}
      - CC_CORS_ORIGINS=${CC_CORS_ORIGINS:-}
      - CC_PROTECT_DOCS=${CC_PROTECT_DOCS:-true}
      - CC_RATE_LIMIT=${CC_RATE_LIMIT:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    # Security: read-only root filesystem
    read_only: true
    tmpfs:
      - /tmp:size=64M
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    networks:
      - frontend
      - backend

networks:
  # frontend: nginx ↔ app (no direct external access to app)
  frontend:
    driver: bridge
  # backend: internal only (future DB, cache, etc.)
  backend:
    driver: bridge
    internal: true
